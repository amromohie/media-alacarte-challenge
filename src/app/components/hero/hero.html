<section class="hero section" id="hero" aria-label="Hero" #heroSection>
  <!-- Decorative Background Layer -->
  <div class="hero__background" aria-hidden="true">
    <div class="hero__glow hero__glow--cyan glow-orb glow-orb--cyan" #glowCyan></div>
    <div class="hero__glow hero__glow--purple glow-orb glow-orb--purple" #glowPurple></div>
    <!-- Animated Grid Pattern -->
    <div class="hero__grid-pattern"></div>
  </div>

  <div class="container hero__container">
    <!-- ─── Text Content ─── -->
    <div class="hero__content">
      <span class="hero__badge badge-primary" #badge>{{ 'HERO.BADGE' | translate }}</span>
      <p class="hero__subtitle" #subtitle>{{ 'HERO.SUBTITLE' | translate }}</p>
      <h1 class="hero__title text-gradient-primary" #title>{{ 'HERO.TITLE' | translate }}</h1>
      <p class="hero__desc" #description>{{ 'HERO.DESCRIPTION' | translate }}</p>

      <div class="hero__actions" #actionsRef>
        <a href="#solutions" class="btn-primary" #ctaBtn>
          {{ 'HERO.CTA' | translate }}
        </a>
        <a href="#services" class="btn-secondary" #learnMoreBtn>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <path d="M10 8l6 4-6 4V8z" />
          </svg>
          {{ 'HERO.LEARN_MORE' | translate }}
        </a>
      </div>
    </div>

    <!-- ─── Modern Visual (No Image) ─── -->
    <div class="hero__visual" #visualContainer>
      <!-- Floating Glass Cards representing platform features -->
      <div class="hero__card hero__card--1" #featureCard>
        <div class="hero__card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v20M2 12h20" />
          </svg>
        </div>
        <div class="hero__card-content">
          <span class="hero__card-label">Automated Bidding</span>
          <span class="hero__card-value">+24% ROI</span>
        </div>
      </div>

      <div class="hero__card hero__card--2" #featureCard>
        <div class="hero__card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
        </div>
        <div class="hero__card-content">
          <span class="hero__card-label">Real-time Analytics</span>
          <span class="hero__card-value">Live Data</span>
        </div>
      </div>

      <div class="hero__card hero__card--3" #featureCard>
        <div class="hero__card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div class="hero__card-content">
          <span class="hero__card-label">Global Network</span>
          <span class="hero__card-value">1.2M Reach</span>
        </div>
      </div>

      <!-- Central Abstract Shape -->
      <div class="hero__abstract-shape" #abstractShape>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="shape-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:var(--accent-cyan);stop-opacity:0.2" />
              <stop offset="100%" style="stop-color:var(--accent-pink);stop-opacity:0.2" />
            </linearGradient>
          </defs>
          <path fill="url(#shape-grad)" d="M44.7,-76.4C58.3,-69.2,70.1,-58.5,78.5,-45.6C86.9,-32.7,91.9,-17.7,91.3,-2.8C90.7,12.1,84.5,26.9,76,39.8C67.5,52.7,56.7,63.7,43.7,71.5C30.7,79.3,15.4,83.9,0.2,83.5C-14.9,83.1,-29.8,77.8,-43,70.2C-56.1,62.6,-67.4,52.8,-75.6,40.5C-83.8,28.2,-88.8,13.4,-89.1,-1.5C-89.4,-16.4,-85,-31.4,-76.6,-44.1C-68.2,-56.8,-55.8,-67.2,-42.1,-74.3C-28.4,-81.4,-14.2,-85.2,0.3,-85.7C14.8,-86.2,29.6,-83.5,44.7,-76.4Z" transform="translate(100 100)" />
        </svg>
      </div>
    </div>
  </div>
</section>
</div>
  </div>
</section>
